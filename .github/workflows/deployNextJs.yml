name: Deploy Next.js Frontend
run-name: ${{ github.actor }} està desplegant el Frontend 🚀
on:
  workflow_call:

jobs:
  build-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontNext
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontNext/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/
            .env.local
            public/
            package.json
            package-lock.json
            next.config.js

  deploy-next:
    runs-on: ubuntu-latest
    needs: [build-next]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: ./.next 

      - name: Deploy to production
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/prod_key.pem
          chmod 600 ~/prod_key.pem
          scp -r -o StrictHostKeyChecking=no -i "~/prod_key.pem" ./.next/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/a23brijaemed/web/a23brijaemed.daw.inspedralbes.cat/public_html/nextJs

      - name: Cleanup
        if: always()
        run: rm -f ~/prod_key.pem