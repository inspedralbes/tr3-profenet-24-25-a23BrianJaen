name: Deploy Node.js API
run-name: ${{ github.actor }} està desplegant l'API 🚀
on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back/apiNode
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './back/apiNode/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Upload API files
        uses: actions/upload-artifact@v4
        with:
          name: node-api
          path: |
            src/
            package.json
            package-lock.json
            .env

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download API files
        uses: actions/download-artifact@v4
        with:
          name: node-api
          path: ./dist

      - name: Deploy to production
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/prod_key.pem
          chmod 600 ~/prod_key.pem
          scp -r -o StrictHostKeyChecking=no -i "~/prod_key.pem" ./dist/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/a23brijaemed/web/a23brijaemed.daw.inspedralbes.cat/public_html/nodeJs

      - name: Cleanup
        if: always()
        run: rm -f ~/prod_key.pem